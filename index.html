<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>원소 타일 생성기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #070c12;
      --bg2:       #0c1520;
      --bg3:       #101c2a;
      --border:    rgba(0,210,255,0.10);
      --border-hi: rgba(0,210,255,0.30);
      --cyan:      oklch(80% 0.17 198);
      --cyan-dim:  oklch(58% 0.12 198);
      --cyan-glow: oklch(80% 0.17 198 / 0.22);
      --text:      oklch(93% 0.008 220);
      --text-muted:oklch(62% 0.015 220);
      --text-dim:  oklch(42% 0.015 220);
      --font-sans: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-sans); overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,210,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,210,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none; z-index: 0;
    }
    #root { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header {
      border-bottom: 1px solid var(--border); padding: 0 36px;
      display: flex; align-items: center; gap: 16px; height: 60px;
      background: rgba(7,12,18,0.90); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 200; flex-shrink: 0;
    }
    .header-icon {
      width: 34px; height: 34px; border: 1.5px solid var(--cyan);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 13px; font-weight: 700;
      color: var(--cyan); box-shadow: 0 0 12px var(--cyan-glow);
      letter-spacing: -1px; flex-shrink: 0;
    }
    .header-titles { flex: 1; min-width: 0; }
    .header-title { font-size: 15px; font-weight: 600; letter-spacing: 0.01em; white-space: nowrap; }
    .header-sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.10em; margin-top: 1px; }
    .header-pill {
      font-family: var(--font-mono); font-size: 10px; color: var(--cyan-dim);
      border: 1px solid var(--border); padding: 3px 10px; border-radius: 100px;
      letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0;
    }

    /* Layout */
    .layout { display: grid; grid-template-columns: 1fr 316px; flex: 1; }

    /* Main */
    .main-panel { padding: 28px 28px 28px 36px; border-right: 1px solid var(--border); overflow-x: auto; min-width: 0; }
    .sec-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .sec-tag {
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      color: var(--cyan); background: rgba(0,210,255,0.07);
      border: 1px solid var(--border-hi); border-radius: 4px; padding: 2px 8px; letter-spacing: 0.10em;
    }
    .sec-name {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap;
    }
    .sec-actions { margin-left: auto; display: flex; gap: 8px; }

    /* Buttons */
    .btn {
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer;
      letter-spacing: 0.03em; transition: all 0.13s; white-space: nowrap;
    }
    .btn:hover { border-color: var(--border-hi); color: var(--text); background: rgba(0,210,255,0.05); }
    .btn-primary {
      background: var(--cyan); color: #070c12; border-color: var(--cyan);
      font-weight: 700; padding: 11px 20px; font-size: 13px;
      box-shadow: 0 0 18px var(--cyan-glow); width: 100%;
    }
    .btn-primary:hover { background: oklch(87% 0.17 198); box-shadow: 0 0 28px oklch(80% 0.17 198 / 0.38); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

    /* Periodic table */
    .pt-wrap { min-width: 860px; }
    .pt-grid {
      display: grid;
      grid-template-columns: repeat(18, minmax(44px, 1fr));
      grid-template-rows: repeat(9, 50px);
      gap: 3px;
    }
    .el {
      border: 1px solid transparent; border-radius: 4px; padding: 3px 3px 2px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: transform 0.11s, background 0.11s; position: relative; overflow: hidden;
    }
    .el:hover { transform: scale(1.10); z-index: 20; }
    .el-num { font-family: var(--font-mono); font-size: 7.5px; font-weight: 400; line-height: 1; color: inherit; opacity: 0.65; align-self: flex-start; }
    .el-sym { font-family: var(--font-mono); font-size: 16px; font-weight: 700; line-height: 1.1; color: inherit; }
    .el-kr  { font-size: 6px; font-weight: 400; line-height: 1; color: inherit; opacity: 0.72; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .el-mass{ font-family: var(--font-mono); font-size: 5.5px; line-height: 1; color: inherit; opacity: 0.50; }
    .el.sel {
      border-color: var(--cyan) !important;
      background: rgba(0,210,255,0.13) !important;
      box-shadow: 0 0 10px var(--cyan-glow), inset 0 0 6px rgba(0,210,255,0.08);
    }
    .el.sel .el-sym { color: var(--cyan); text-shadow: 0 0 7px var(--cyan); }
    .el.sel .el-num, .el.sel .el-kr, .el.sel .el-mass { color: var(--cyan); }
    .el-empty { pointer-events: none; background: transparent !important; border: none !important; }
    .el-flbl { pointer-events: none; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 15px; color: var(--text-dim); opacity: 0.4; }

    .cat-alkali       { background: rgba(239,68,68,0.09);   color: #fca5a5; border-color: rgba(239,68,68,0.14); }
    .cat-alkali-earth { background: rgba(249,115,22,0.09);  color: #fdba74; border-color: rgba(249,115,22,0.14); }
    .cat-transition   { background: rgba(234,179,8,0.07);   color: #fde68a; border-color: rgba(234,179,8,0.12); }
    .cat-post         { background: rgba(34,197,94,0.08);   color: #86efac; border-color: rgba(34,197,94,0.12); }
    .cat-metalloid    { background: rgba(20,184,166,0.09);  color: #5eead4; border-color: rgba(20,184,166,0.14); }
    .cat-nonmetal     { background: rgba(56,189,248,0.09);  color: #7dd3fc; border-color: rgba(56,189,248,0.14); }
    .cat-halogen      { background: rgba(99,102,241,0.10);  color: #a5b4fc; border-color: rgba(99,102,241,0.15); }
    .cat-noble        { background: rgba(168,85,247,0.09);  color: #d8b4fe; border-color: rgba(168,85,247,0.14); }
    .cat-lanthanide   { background: rgba(236,72,153,0.08);  color: #f9a8d4; border-color: rgba(236,72,153,0.12); }
    .cat-actinide     { background: rgba(244,63,94,0.07);   color: #fda4af; border-color: rgba(244,63,94,0.10); }
    .el:hover.cat-alkali       { background: rgba(239,68,68,0.20) !important; }
    .el:hover.cat-alkali-earth { background: rgba(249,115,22,0.20) !important; }
    .el:hover.cat-transition   { background: rgba(234,179,8,0.16) !important; }
    .el:hover.cat-post         { background: rgba(34,197,94,0.16) !important; }
    .el:hover.cat-metalloid    { background: rgba(20,184,166,0.18) !important; }
    .el:hover.cat-nonmetal     { background: rgba(56,189,248,0.18) !important; }
    .el:hover.cat-halogen      { background: rgba(99,102,241,0.18) !important; }
    .el:hover.cat-noble        { background: rgba(168,85,247,0.18) !important; }
    .el:hover.cat-lanthanide   { background: rgba(236,72,153,0.15) !important; }
    .el:hover.cat-actinide     { background: rgba(244,63,94,0.14) !important; }

    /* Legend */
    .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot  { width: 9px; height: 9px; border-radius: 2px; }
    .legend-lbl  { font-size: 10.5px; color: var(--text-muted); }

    /* Sidebar */
    .sidebar { padding: 28px 24px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
    .panel-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .panel-title { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; white-space: nowrap; }
    .panel-badge {
      margin-left: auto; font-family: var(--font-mono); font-size: 11px;
      color: var(--cyan); background: rgba(0,210,255,0.08);
      border: 1px solid var(--border); border-radius: 100px; padding: 1px 8px;
    }

    /* Chips */
    .chips { display: flex; flex-wrap: wrap; gap: 4px; max-height: 88px; overflow-y: auto; }
    .chips::-webkit-scrollbar { width: 3px; }
    .chips::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .chip {
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      color: var(--cyan); background: rgba(0,210,255,0.07);
      border: 1px solid var(--border-hi); border-radius: 3px;
      padding: 2px 6px; cursor: pointer; transition: background 0.1s;
    }
    .chip:hover { background: rgba(0,210,255,0.15); }
    .chips-empty { font-size: 12px; color: var(--text-dim); font-style: italic; }

    /* Settings */
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 12px; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
    .setting-right { display: flex; align-items: center; gap: 5px; }
    .setting-input {
      width: 70px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text);
      font-family: var(--font-mono); font-size: 13px; font-weight: 500;
      padding: 5px 8px; text-align: right;
      transition: border-color 0.13s, box-shadow 0.13s; outline: none;
    }
    .setting-input:focus { border-color: var(--cyan-dim); box-shadow: 0 0 0 2px rgba(0,210,255,0.09); }
    .setting-unit { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }

    /* Font tag */
    .font-tag {
      display: flex; align-items: center; gap: 8px; padding: 9px 11px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px;
    }
    .font-tag-label { font-size: 11px; color: var(--text-dim); }
    .font-tag-val { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); margin-left: auto; }

    /* Generate */
    .gen-hint {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
      line-height: 1.65; margin-bottom: 12px; padding: 10px 12px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    }
    .gen-hint strong { color: var(--text-muted); font-weight: 600; }

    /* Log */
    .log-wrap {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; max-height: 120px; overflow-y: auto;
      font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); line-height: 1.7;
      margin-top: 10px;
    }
    .log-ok   { color: oklch(75% 0.15 150); }
    .log-warn { color: oklch(80% 0.17 50); }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(72px);
      background: var(--bg2); border: 1px solid var(--border-hi);
      border-radius: 8px; padding: 11px 18px; font-size: 13px; color: var(--text);
      box-shadow: 0 8px 28px rgba(0,0,0,0.55); z-index: 9999;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Tweaks panel */
    .twk-panel {
      position: fixed; right: 16px; bottom: 16px; z-index: 2147483646; width: 260px;
      max-height: calc(100vh - 32px); display: flex; flex-direction: column;
      background: rgba(12,21,32,0.95); color: var(--text);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border-hi); border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      font: 12px/1.4 var(--font-sans); overflow: hidden;
    }
    .twk-hd { display: flex; align-items: center; justify-content: space-between; padding: 10px 8px 10px 14px; cursor: move; user-select: none; border-bottom: 1px solid var(--border); }
    .twk-hd b { font-size: 12px; font-weight: 600; color: var(--cyan); letter-spacing: 0.06em; }
    .twk-x { appearance: none; border: 0; background: transparent; color: var(--text-dim); width: 22px; height: 22px; border-radius: 6px; cursor: pointer; font-size: 13px; line-height: 1; }
    .twk-x:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .twk-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    .twk-sect { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cyan-dim); padding: 4px 0 0; }
    .twk-row-h { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .twk-lbl { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .twk-toggle { position: relative; width: 32px; height: 18px; border: 0; border-radius: 999px; background: rgba(255,255,255,0.12); transition: background 0.15s; cursor: pointer; padding: 0; flex-shrink: 0; }
    .twk-toggle[data-on="1"] { background: var(--cyan); }
    .twk-toggle i { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.3); transition: transform 0.15s; display: block; }
    .twk-toggle[data-on="1"] i { transform: translateX(14px); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(0,210,255,0.18); border-radius: 3px; }
  </style>
</head>

const MODEL_BODY = `corner_radius = 5;
base_thickness = 4;
frame_width = 1.8;
frame_height = 0.6;
text_height = 0.6;
slot_width = 25; slot_height = 2.0; slot_depth = 3.0; slot_z = 1.2;
fit_clearance = 0.15; connector_length = slot_width - 0.2; connector_height = slot_height - fit_clearance;
connector_depth = 2*(slot_depth - fit_clearance); connector_gap = 8; connector_corner = 0.6;
atomic_x = -28; atomic_y = 28; symbol_x = 0; symbol_y = 9; name_x = 0; name_y = -16; number_x = 0; number_y = -28;
module rounded_square(sz, r) { offset(r = r) square([sz - 2*r, sz - 2*r], center = true); }
module outer_shape_2d() { rounded_square(tile_size, corner_radius); }
frame_inset = 0.25;
module outer_frame_2d() { difference() { offset(delta = -frame_inset) outer_shape_2d(); offset(delta = -(frame_inset + frame_width)) outer_shape_2d(); } }
module base_body() { linear_extrude(height = base_thickness) outer_shape_2d(); }
module top_outer_frame() { translate([0,0,base_thickness]) linear_extrude(height = frame_height) outer_frame_2d(); }
module left_slot() { translate([-tile_size/2 - 0.1, -slot_width/2, slot_z]) cube([slot_depth + 0.2, slot_width, slot_height]); }
module right_slot() { translate([tile_size/2 - slot_depth + 0.1, -slot_width/2, slot_z]) cube([slot_depth + 0.2, slot_width, slot_height]); }
module texts() {
 translate([atomic_x, atomic_y, base_thickness]) linear_extrude(height = text_height) text(atomic_number, size = atomic_size, halign = "center", valign = "center", font = font_name);
 translate([symbol_x, symbol_y, base_thickness]) linear_extrude(height = text_height) text(symbol, size = symbol_size, halign = "center", valign = "center", font = font_name);
 translate([name_x, name_y, base_thickness]) linear_extrude(height = text_height) text(name, size = name_size, halign = "center", valign = "center", font = font_name);
 translate([number_x, number_y, base_thickness]) linear_extrude(height = text_height) text(number, size = number_size, halign = "center", valign = "center", font = font_name);
}
module tile() { difference() { union() { base_body(); top_outer_frame(); texts(); } left_slot(); right_slot(); } }
if (show_tile) tile();`;

function makeScad([z, s], o) {
  const n = KR[s] || s,w = AW[s] || String(z);
  return `symbol = "${s}";\nname = "${n}";\nnumber = "${w}";\natomic_number = "${z}";\nfont_name = "${o.fontName}";\nshow_tile = true;\nshow_connector = false;\ntile_size = ${o.tileSize};\nsymbol_size = ${o.symbolSize};\nname_size = ${o.nameSize};\nnumber_size = ${o.numberSize};\natomic_size = ${o.atomicSize};\n${MODEL_BODY}\n`;
}

/* ── Tweaks components (inline — no external file needed) ────────── */
function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });
  const clamp = useCallback(() => {
    const p = dragRef.current;if (!p) return;
    const maxX = window.innerWidth - p.offsetWidth - 16;
    const maxY = window.innerHeight - p.offsetHeight - 16;
    offsetRef.current = { x: Math.min(Math.max(16, offsetRef.current.x), maxX), y: Math.min(Math.max(16, offsetRef.current.y), maxY) };
    p.style.right = offsetRef.current.x + 'px';
    p.style.bottom = offsetRef.current.y + 'px';
  }, []);
  useEffect(() => {
    const onMsg = (e) => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);else
      if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => {setOpen(false);window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');};
  const onDragStart = (e) => {
    const p = dragRef.current;if (!p) return;
    const r = p.getBoundingClientRect();
    const sx = e.clientX,sy = e.clientY;
    const sr = window.innerWidth - r.right,sb = window.innerHeight - r.bottom;
    const move = (ev) => {offsetRef.current = { x: sr - (ev.clientX - sx), y: sb - (ev.clientY - sy) };clamp();};
    const up = () => {window.removeEventListener('mousemove', move);window.removeEventListener('mouseup', up);};
    window.addEventListener('mousemove', move);window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
      <div className="twk-hd" onMouseDown={onDragStart}>
        <b>TWEAKS</b>
        <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
      </div>
      <div className="twk-body">{children}</div>
    </div>);

}

function TweakSection({ title }) {
  return <div className="twk-sect">{title}</div>;
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row-h">
      <span className="twk-lbl">{label}</span>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}

    </div>);

}

          {/* Generate */}
          <div className="panel">
            <div className="panel-hd">
              <span className="sec-tag">04</span>
              <span className="panel-title">생성</span>
            </div>
            <div className="gen-hint" style={{ color: "rgb(206, 206, 206)" }}>
              <strong style={{ color: "rgb(206, 206, 206)" }}>① SCAD ZIP 다운로드</strong><br />
              ② ZIP 압축 해제<br />
              ③ convert_to_stl<strong style={{ color: "rgb(206, 206, 206)" }}>.bat</strong> (Windows) 또는 <strong style={{ color: "rgb(206, 206, 206)" }}>.sh</strong> (Mac/Linux) 실행<br />
              ④ stl 폴더에서 STL 확인
            </div>
            <button className="btn btn-primary" onClick={handleGenerate}
            disabled={selected.size === 0 || generating}>
              {generating ? '생성 중…' : `⬇  SCAD ZIP 만들기 (${selected.size}개)`}
            </button>
            {logs.length > 0 &&
            <div className="log-wrap">
                {logs.map((l, i) => <div key={i} className={`log-${l.type}`}>{l.text}</div>)}
              </div>
            }
          </div>
        </div>
      </div>

      {/* Toast */}
      <div className={`toast${toast.show ? ' show' : ''}`}>{toast.msg}</div>

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection title="표시 옵션" />
        <TweakToggle label="한글 원소 이름" value={tweaks.showKorean} onChange={(v) => setTweak('showKorean', v)} />
        <TweakToggle label="원자량" value={tweaks.showMass} onChange={(v) => setTweak('showMass', v)} />
      </TweaksPanel>
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
